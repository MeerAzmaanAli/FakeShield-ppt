<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FakeShield — Slides (merged sections)</title>
  <style>
    /* minimal controls styling; original page styles will be injected from sources */
    :root{--ctrl-bg:rgba(15,14,12,0.85);--ctrl-fg:#fff}
    html,body{height:100%;margin:0}
    body{font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;background:#fff}
    #slides{height:100vh;position:relative;overflow:hidden}
    .merged-slide{display:none;height:100vh;overflow:auto}
    .merged-slide.active{display:block}
    .controls{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;display:flex;gap:10px;z-index:99999}
    .btn{background:var(--ctrl-bg);color:var(--ctrl-fg);border:0;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:600}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .indicator{position:fixed;right:18px;top:14px;background:rgba(0,0,0,0.6);color:#fff;padding:6px 10px;border-radius:6px;font-family:monospace;z-index:99999}
  </style>
</head>
<body>

  <main id="slides" aria-live="polite"></main>

  <div class="controls">
    <button id="prev" class="btn">◀ Prev</button>
    <button id="next" class="btn">Next ▶</button>
  </div>
  <div id="indicator" class="indicator">0 / 0</div>

  <script>
    // Fetch both source pages, inject their head styles/links, and extract div.divider + section pairs
    (async function(){
      const files = ['fakeshield-part 01.html','fakeshield-part 02.html'];
      const container = document.getElementById('slides');
      const slides = [];
      const head = document.head;

      const existingLinks = new Set();
      const existingStyles = new Set();

      for (const f of files) {
        try {
          const res = await fetch(encodeURI(f));
          if (!res.ok) { console.warn('Failed to fetch', f, res.status); continue; }
          const text = await res.text();
          const doc = new DOMParser().parseFromString(text, 'text/html');

          // copy link tags (fonts, preconnect, etc.)
          for (const link of Array.from(doc.querySelectorAll('link'))) {
            const key = link.getAttribute('href') || link.outerHTML;
            if (!existingLinks.has(key) && !document.querySelector(`link[href="${link.getAttribute('href')}"]`)) {
              existingLinks.add(key);
              head.appendChild(link.cloneNode(true));
            }
          }

          // copy style tags
          for (const style of Array.from(doc.querySelectorAll('style'))) {
            const css = style.textContent.trim();
            if (!existingStyles.has(css)) {
              existingStyles.add(css);
              const s = document.createElement('style');
              s.textContent = css;
              head.appendChild(s);
            }
          }

          // remove nav/footer/progress from doc to avoid duplicates
          doc.querySelectorAll('nav, footer, #progress').forEach(n => n.remove());

          const children = Array.from(doc.body.children);
          for (let i = 0; i < children.length; i++) {
            const el = children[i];
            if (el.classList && el.classList.contains('divider')) {
              const next = children[i+1];
              if (next && next.tagName.toLowerCase() === 'section') {
                const wrapper = document.createElement('div');
                wrapper.className = 'merged-slide';
                wrapper.appendChild(el.cloneNode(true));
                wrapper.appendChild(next.cloneNode(true));
                container.appendChild(wrapper);
                slides.push(wrapper);
                i++; // skip next
                continue;
              } else {
                const wrapper = document.createElement('div');
                wrapper.className = 'merged-slide';
                wrapper.appendChild(el.cloneNode(true));
                container.appendChild(wrapper);
                slides.push(wrapper);
                continue;
              }
            }

            if (el.tagName && el.tagName.toLowerCase() === 'section') {
              const wrapper = document.createElement('div');
              wrapper.className = 'merged-slide';
              wrapper.appendChild(el.cloneNode(true));
              container.appendChild(wrapper);
              slides.push(wrapper);
            }
          }

        } catch (err) {
          console.error('error loading', f, err);
        }
      }

      // navigation
      let current = 0;
      const prevBtn = document.getElementById('prev');
      const nextBtn = document.getElementById('next');
      const indicator = document.getElementById('indicator');

      function show(i){
        if (!slides.length) return;
        i = Math.max(0, Math.min(slides.length-1, i));
        slides.forEach((s, idx) => s.classList.toggle('active', idx === i));
        current = i;
        prevBtn.disabled = current === 0;
        nextBtn.disabled = current === slides.length - 1;
        indicator.textContent = (current+1) + ' / ' + slides.length;
        // reveal content relying on .visible
        slides[current].querySelectorAll('section, .scale-cell, .platform-row, .pain-card, .vision-card, .stat-cell, .feature-item, .wf-step, .conclusion-item').forEach(el => el.classList.add('visible'));
      }

      prevBtn.addEventListener('click', () => show(current - 1));
      nextBtn.addEventListener('click', () => show(current + 1));
      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') show(current + 1);
        if (e.key === 'ArrowLeft') show(current - 1);
      });

      // initial
      show(0);

      // update todo list status via console (user-facing plan tracked separately)
      console.info('Slides loaded:', slides.length);

      // Inject overrides: set hero title color to white for specific slides
      // and reduce the vertical padding on dividers and sections to 1rem top.
      (function(){
        const css = `
          .merged-slide:nth-of-type(1) .hero-title,
          .merged-slide:nth-of-type(9) .hero-title { color: var(--paper) !important; }
          .merged-slide .divider { padding: 1rem 2rem !important; margin: 0 2rem !important; }
          /* Reduce top padding of all sections inside slides to 1rem */ 
          .merged-slide section { padding-top: 1rem !important; }
          /* keep small-screen spacing reasonable */ 
          @media (max-width: 768px) { 
            .merged-slide .divider { padding: 0.6rem 1rem !important; margin: 0 1rem !important; } 
            .merged-slide section { padding-top: 0.6rem !important; }
          }
        `;
        const s = document.createElement('style');
        s.textContent = css;
        document.head.appendChild(s);
      })();
    })();
  </script>

</body>
</html>
